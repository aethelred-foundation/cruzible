name: Security Audit

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches:
      - main
      - develop
      - ramesh/**
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  CARGO_TERM_COLOR: always

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  node-audit:
    name: Node Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/api/package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Audit root production dependencies
        run: npm run security:audit

      - name: Install backend API dependencies
        working-directory: ./backend/api
        run: npm ci --ignore-scripts

      - name: Audit backend API production dependencies
        working-directory: ./backend/api
        run: npm audit --omit=dev --audit-level=high

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/contracts -> target

      - name: Audit Rust dependencies
        uses: actions-rust-lang/audit@v1
        with:
          createIssues: false
          denyWarnings: true
          file: Cargo.lock
          ignore: RUSTSEC-2024-0344,RUSTSEC-2024-0388
          workingDirectory: backend/contracts
