# Aethelred Blockchain Infrastructure
# Production-grade Docker Compose configuration

version: "3.8"

services:
  # ============ AETHELRED NODE ============
  aethelred-node:
    build:
      context: ../node
      dockerfile: Dockerfile
      target: production
    container_name: aethelred-node
    restart: unless-stopped
    ports:
      - "26656:26656" # P2P
      - "26657:26657" # RPC
      - "1317:1317" # REST API
      - "9090:9090" # gRPC
      - "9091:9091" # gRPC Web
    volumes:
      - aethelred-data:/data
      - ./config/node:/config:ro
    environment:
      - CHAIN_ID=${CHAIN_ID:-aethelred-1}
      - MONIKER=${MONIKER:-aethelred-node}
      - MINIMUM_GAS_PRICES=${MINIMUM_GAS_PRICES:-0.025aeth}
      - PRUNING=${PRUNING:-default}
      - INDEXER=${INDEXER:-kv}
    networks:
      - aethelred-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 16G
        reservations:
          cpus: "2.0"
          memory: 8G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service_name,environment"

  # ============ API GATEWAY ============
  api-gateway:
    build:
      context: ../api
      dockerfile: Dockerfile
      target: production
    container_name: aethelred-api
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001" # Metrics
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RPC_URL=http://aethelred-node:26657
      - GRPC_URL=http://aethelred-node:9090
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/aethelred?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - RATE_LIMIT_ENABLED=true
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      aethelred-node:
        condition: service_healthy
    networks:
      - aethelred-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ============ INDEXER ============
  indexer:
    build:
      context: ../api
      dockerfile: Dockerfile.indexer
    container_name: aethelred-indexer
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - RPC_URL=http://aethelred-node:26657
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/aethelred?schema=public
      - REDIS_URL=redis://redis:6379
      - START_HEIGHT=${INDEXER_START_HEIGHT:-0}
      - BATCH_SIZE=${INDEXER_BATCH_SIZE:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      aethelred-node:
        condition: service_healthy
    networks:
      - aethelred-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ============ POSTGRESQL ============
  postgres:
    image: postgres:16-alpine
    container_name: aethelred-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_USER=${DB_USER:-aethelred}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=${DB_NAME:-aethelred}
      - POSTGRES_INITDB_ARGS="--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=5242kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=4"
      - "-c"
      - "max_parallel_workers_per_gather=2"
      - "-c"
      - "max_parallel_workers=4"
    networks:
      - aethelred-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-aethelred} -d ${DB_NAME:-aethelred}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 4G

  # ============ REDIS ============
  redis:
    image: redis:7-alpine
    container_name: aethelred-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - aethelred-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  # ============ NGINX REVERSE PROXY ============
  nginx:
    image: nginx:alpine
    container_name: aethelred-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - api-gateway
    networks:
      - aethelred-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============ PROMETHEUS ============
  prometheus:
    image: prom/prometheus:latest
    container_name: aethelred-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - aethelred-network

  # ============ GRAFANA ============
  grafana:
    image: grafana/grafana:latest
    container_name: aethelred-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3002}
    networks:
      - aethelred-network
    depends_on:
      - prometheus

  # ============ JAEGER (TRACING) ============
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: aethelred-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - aethelred-network

  # ============ SEED NODE (for P2P discovery) ============
  seed-node:
    build:
      context: ../node
      dockerfile: Dockerfile
      target: production
    container_name: aethelred-seed
    restart: unless-stopped
    ports:
      - "26656"
    volumes:
      - seed-data:/data
    environment:
      - CHAIN_ID=${CHAIN_ID:-aethelred-1}
      - MONIKER=aethelred-seed
      - P2P_SEED_MODE=true
      - P2P_PEX=true
    command: ["aethelred-node", "start", "--p2p.seed_mode"]
    networks:
      - aethelred-network

networks:
  aethelred-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  aethelred-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  seed-data:
    driver: local
