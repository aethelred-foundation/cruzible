# Cargo Audit Configuration
# https://rustsec.org/

[advisories]
# curve25519-dalek v3 has timing variability (RUSTSEC-2024-0344).
# This is a CosmWasm transitive dependency — upgrading requires
# a CosmWasm major version bump which is out of scope.
# Risk: Low in our context (smart contract execution, not key generation).
ignore = [
    "RUSTSEC-2024-0344",
    "RUSTSEC-2024-0388",
]

# Fail the audit on new unmaintained / unsound / yanked crates while
# documenting the currently accepted CosmWasm transitive exceptions above.
informational_warnings = ["unmaintained", "unsound", "yanked"]

# derivative is unmaintained (RUSTSEC-2024-0388) — informational only and
# also a CosmWasm transitive dependency. We ignore that specific advisory
# above so stricter warning handling can still flag any new issues.
